@if(product){
    <div class="product-details">
        <img src="product.images[0]" alt="product.name">
        <h2>{{product.name}}</h2>
        <p>{{product.description}}</p>
        <h3>R {{product.price}}</h3>
        <button (click)="addToCart(product)">
            Add To Cart
        </button>
    </div>
}
