<div class="header">
  <!-- Categories -->
  <div class="categories">
    <a routerLink="/men">Men</a>
    <a routerLink="/women">Women</a>
    <a routerLink="/kids">Kids</a>
    <a routerLink="/new">New & featured</a>
  </div>

  <!-- Logo -->
  <div class="logo">
    <img
      src="assets/logos/logo_white_bg.png"
      alt="Logo"
      class="logo"
      (click)="goTohomePage()"
      style="cursor: pointer"
    />
  </div>

  <!-- Search, Cart & Login -->
  <div class="search-login">
    <mat-icon>search</mat-icon>

    <!-- Cart icon with badge -->
    <div class="cart-icon-wrap" (click)="goTocartPage()">
      <mat-icon class="shopping-bag">shopping_bag</mat-icon>
      @if (cartCount() > 0) {
        <span class="cart-badge">
          {{ cartCount() > 99 ? '99+' : cartCount() }}
        </span>
      }
    </div>

    @if (isLoggedIn$ | async) {
      <div
        class="profile-icon"
        (mouseenter)="showAccountDetails = true"
        (mouseleave)="showAccountDetails = false"
      >
        {{ initials$ | async }}
      </div>
      @if (showAccountDetails) {
        <div class="popup">
          <account-details></account-details>
        </div>
      }
    } @else {
      <a routerLink="/login">Login</a>
    }
  </div>
</div>
