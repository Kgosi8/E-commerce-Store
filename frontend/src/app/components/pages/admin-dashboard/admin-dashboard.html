<h2>Add Product</h2>

<input type="text" [(ngModel)]="product.name" placeholder="Name" />
<input type="number" [(ngModel)]="product.price" placeholder="Price" />
<input type="text" [(ngModel)]="product.description" placeholder="Description" />
<input type="number" [(ngModel)]="product.stock" placeholder="Stock" />
<input type="text" [(ngModel)]="product.category" placeholder="Category" />

<input type="file" multiple (change)="onFileSelected($event)" />

<div class="preview-container">
  
  @for(img of previewUrls; track img){
    <div class="preview-card"><img [src]="img" alt="Image Preview" width="100" /></div>
    
  }

  <button (click)="submit()">Add Product</button>
    
</div>
